// ── Auth helpers
async function signUp(email, password) {
  if (!sb) return { error: { message: "Supabase não configurado" } };
  const { error } = await sb.auth.signUp({ email, password });
  return { error };
}
async function signIn(email, password) {
  if (!sb) return { error: { message: "Supabase não configurado" } };
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  return { data, error };
}
async function signOut() {
  if (!sb) return;
  await sb.auth.signOut();
}
async function getUser() {
  if (!sb) return null;
  const { data } = await sb.auth.getUser();
  return data?.user || null;
}

// ── Guarda user em memória para evitar race conditions
let _cachedUser = null;
async function getCachedUser(){
  if(_cachedUser) return _cachedUser;
  if(!sb) return null;
  const {data} = await sb.auth.getUser();
  _cachedUser = data?.user || null;
  return _cachedUser;
}
// Limpa cache ao trocar de sessão
if(sb) sb.auth.onAuthStateChange((_,session)=>{
  _cachedUser = session?.user || null;
});

// ── DB helpers (com user_id garantido)
async function dbInsert(table, data) {
  if (!sb) { console.log("[offline] INSERT →", table, data); return { error: null }; }
  const user = await getCachedUser();
  if(!user){ console.warn("dbInsert sem user_id"); return { error: null }; }
  const row = { ...data, user_id: user.id };
  const { error } = await sb.from(table).insert(row);
  if (error) console.error("Supabase erro:", error.message);
  return { error };
}
async function dbUpsert(table, data, onConflict) {
  if (!sb) { console.log("[offline] UPSERT →", table, data); return { error: null }; }
  const user = await getCachedUser();
  if(!user){ console.warn("dbUpsert sem user_id"); return { error: null }; }
  const row = { ...data, user_id: user.id };
  const { error } = await sb.from(table).upsert(row, { onConflict });
  if (error) console.error("Supabase erro:", error.message);
  return { error };
}
async function dbSelect(table, filters) {
  if (!sb) return { data: [], error: null };
  const user = await getCachedUser();
  if(!user) return { data: [], error: null };
  let q = sb.from(table).select("*").eq("user_id", user.id);
  if (filters) Object.entries(filters).forEach(([k,v]) => { q = q.eq(k, v); });
  const { data, error } = await q;
  if (error) console.error("Supabase erro:", error.message);
  return { data: data || [], error };
}

        const r=data[0];

  useEffect(()=>{
    const p=PLAN[weekNum];

    if(!sb){ setTasks(base); return; }
    dbSelect("task_progress",{week_number:weekNum}).then(({data})=>{
      let loaded;

        loaded=base.map(t=>({...t,done:doneIds.has(t.id)}));

      setTasks(loaded);
      const delta={};
      loaded.forEach(t=>{ const c=AREA_TO_COV[t.area]; if(c){if(!delta[c])delta[c]=0; if(t.done)delta[c]++;} });
      setCompletedByCov(old=>{
        const afetadas=new Set(loaded.map(t=>AREA_TO_COV[t.area]).filter(Boolean));

            React.createElement("div",{style:{padding:"10px 13px",borderRadius:10,background:bg,border:"1px solid "+br,fontSize:12,color:col}},

        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}},
          coverage.map(c=>{
            const col=c.pct>=60?C.ok:c.pct>=30?C.gold:C.rose;
            return React.createElement("div",{key:c.area,style:crd},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
                React.createElement("span",{style:{fontSize:13,fontWeight:500,color:C.text}},c.area),
                React.createElement("span",{style:{fontSize:15,fontWeight:700,color:col}},c.pct+"%")),
              React.createElement(Bar,{pct:c.pct,color:col,h:6}));
          })
        ),
        React.createElement("div",{style:{background:"linear-gradient(135deg,"+C.roseP+","+C.goldP+")",
          border:"1px solid "+C.roseS,borderRadius:16,padding:"16px 20px",display:"flex",alignItems:"center",gap:16}},

            React.createElement(Ring,{pct:geral}),
            React.createElement("div",{style:{position:"absolute",fontSize:14,fontWeight:700,color:C.roseD}},geral+"%")),
          React.createElement("div",null,
            React.createElement("div",{style:{fontSize:11,color:C.roseD,fontWeight:600,marginBottom:2}},"Cobertura geral do edital"),

    // ── MOBILE BOTTOM NAV

      NAV.map(item=>{

        return React.createElement("button",{key:item.id,className:"mob-btn",onClick:()=>setSection(item.id),
          style:{color:active?"#C4899A":"#B0A098",fontWeight:active?700:400}},
          React.createElement("span",{style:{fontSize:22}},item.icon),
          item.label);
      })
    )
  );
}
